<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santo Pegasus AI Assistant</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --bubble-user: #2563eb;
    --bubble-bot: #262a33;
    --text: #e8e9ec;
    --muted: #9198a3;
    --accent: #22c55e;
    --danger: #ef4444;
    --border: #2f333d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0 0 4px 0;
    font-size: 18px;
  }
  .disclaimer {
    font-size: 12.5px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .disclaimer .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.45;
    font-size: 14.5px;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--bubble-user);
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bubble-bot);
    border-bottom-left-radius: 4px;
  }
  .msg.bot.loading {
    color: var(--muted);
    font-style: italic;
  }
  .feedback {
    align-self: flex-start;
    display: flex;
    gap: 8px;
    margin-top: -6px;
    margin-left: 4px;
  }
  .feedback button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
  }
  .feedback button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--text);
  }
  .feedback button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .feedback .sent {
    font-size: 12.5px;
    color: var(--accent);
    align-self: center;
  }
  form#composer {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  #input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14.5px;
    outline: none;
  }
  #input:focus { border-color: var(--bubble-user); }
  #send {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: var(--bubble-user);
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  #send:disabled { opacity: 0.5; cursor: default; }
  .sources {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>🩺 Santo Pegasus AI Assistant</h1>
  <div class="disclaimer"><span class="dot"></span> Estás hablando con un agente de IA (RAG), no con una persona. Respuestas basadas en la documentación interna de Santo Pegasus Soluciones.</div>
</header>

<div id="chat"></div>

<form id="composer">
  <input id="input" type="text" placeholder="Escribe tu pregunta sobre Santo Pegasus..." autocomplete="off" />
  <button id="send" type="submit">Enviar</button>
</form>

<script>
  // Configura aquí la URL del webhook de chat y de feedback de tu workflow n8n.
  const CHAT_WEBHOOK_URL = "https://n8n-challenge.ren-lab-content.uk/webhook/f5149e0b-ed41-4521-9e6d-39e42de9819d/chat";
  const FEEDBACK_WEBHOOK_URL = "https://n8n-challenge.ren-lab-content.uk/webhook/santo-pegasus-feedback";

  const sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));

  const chatEl = document.getElementById("chat");
  const form = document.getElementById("composer");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function addFeedbackRow(question, answer) {
    const row = document.createElement("div");
    row.className = "feedback";

    const up = document.createElement("button");
    up.textContent = "👍 Útil";
    const down = document.createElement("button");
    down.textContent = "👎 No útil";

    function sendFeedback(rating) {
      up.disabled = true;
      down.disabled = true;
      fetch(FEEDBACK_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, question, answer, rating })
      }).catch(() => {});
      const sent = document.createElement("span");
      sent.className = "sent";
      sent.textContent = "¡Gracias por tu feedback!";
      row.appendChild(sent);
    }

    up.addEventListener("click", () => sendFeedback("up"));
    down.addEventListener("click", () => sendFeedback("down"));

    row.appendChild(up);
    row.appendChild(down);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  async function sendMessage(text) {
    addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;

    const loadingEl = addMessage("bot loading", "Pensando...");

    try {
      const res = await fetch(CHAT_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chatInput: text, sessionId })
      });
      const data = await res.json();
      const answer = data.output || data.text || JSON.stringify(data);
      loadingEl.remove();
      addMessage("bot", answer);
      addFeedbackRow(text, answer);
    } catch (err) {
      loadingEl.textContent = "Hubo un error al conectar con el asistente. Intenta de nuevo.";
      loadingEl.classList.remove("loading");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    sendMessage(text);
  });

  addMessage("bot", "¡Hola! Soy el asistente de conocimiento interno de Santo Pegasus. Pregúntame sobre onboarding, ingeniería back-end/front-end, protocolo de incidentes o arquitectura de microservicios.");
</script>

</body>
</html>
